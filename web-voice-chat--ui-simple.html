<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Voice Chat</title>
</head>
<body>

<button id="start-btn">Start Mic</button>
<button id="stop-btn" disabled>Stop</button>
<div id="messages" style="height:300px;overflow-y:auto;border:1px solid #ccc;padding:4px"></div>

<script>
const WS_URL = "ws://localhost:8765";

const startBtn = document.getElementById("start-btn");
const stopBtn  = document.getElementById("stop-btn");
const messages = document.getElementById("messages");

const MIC_SAMPLE_RATE   = 16000;
const TTS_SAMPLE_RATE   = 24000;
const BUFFER_SIZE       = 256;

let ws           = null;
let audioContext = null;
let micStream    = null;
let scriptNode   = null;
let sourceNode   = null;

let onTranscriptFullId = null;

// Tracks in-progress streamed response lines keyed by stream id
const streamLines = {};

// ── Gapless audio scheduler ───────────────────────────────────────────────
// nextPlayAt tracks the AudioContext timestamp at which the next chunk
// should start, ensuring back-to-back chunks play without gaps or overlap.
let nextPlayAt = 0;

function scheduleAudioChunk(float32Samples) {
  if (!audioContext) return;

  const buffer = audioContext.createBuffer(1, float32Samples.length, TTS_SAMPLE_RATE);
  buffer.copyToChannel(float32Samples, 0);

  const source = audioContext.createBufferSource();
  source.buffer = buffer;
  source.connect(audioContext.destination);

  // Schedule immediately if we've fallen behind (e.g. first chunk or after a gap)
  const now = audioContext.currentTime;
  if (nextPlayAt < now) nextPlayAt = now;

  source.start(nextPlayAt);
  nextPlayAt += buffer.duration;
}

function resetAudioScheduler() {
  nextPlayAt = 0;
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.binaryType = "arraybuffer";

  ws.addEventListener("open",  () => addLine("-- connected --"));
  ws.addEventListener("close", () => addLine("-- disconnected --"));
  ws.addEventListener("error", () => addLine("-- connection error --"));

  ws.addEventListener("message", ({ data }) => {
    const msg = JSON.parse(data);

    ////////////////
    // STT Events //
    ////////////////
    if (msg.type === "on-transcript-unfinished" && msg.text) {
      if (msg.utterance_id !== onTranscriptFullId) {
        if (streamLines[msg.utterance_id]) {
          streamLines[msg.utterance_id].textContent = "You: " + msg.text;
        } else {
          streamLines[msg.utterance_id] = addLine("You: " + msg.text);
        }
        scrollDown();
      }

    } else if (msg.type === "on-transcript-finished" && msg.text) {
      onTranscriptFullId = msg.utterance_id;
      if (streamLines[msg.utterance_id]) {
        streamLines[msg.utterance_id].textContent = "You: " + msg.text;
        scrollDown();
        delete streamLines[msg.utterance_id];
      }

    ///////////////////////////
    // AI Output Text Events //
    ///////////////////////////
    } else if (msg.type === "on-ai-text-response-start") {
      streamLines[msg.id] = addLine("server: ");
      scrollDown();

    } else if (msg.type === "on-ai-text-response-chunk") {
      if (streamLines[msg.id]) {
        streamLines[msg.id].textContent += msg.chunk;
        scrollDown();
      }

    } else if (msg.type === "on-ai-text-response-end") {
      delete streamLines[msg.id];

    ////////////////////////////
    // AI Output Audio Events //
    ////////////////////////////
    } else if (msg.type === "on-ai-audio-start") {
      // Reset the scheduler so this response's audio starts from "now"
      resetAudioScheduler();

    } else if (msg.type === "on-ai-audio-chunk") {
      // msg.audio is a plain JS array of float32 sample values
      const samples = new Float32Array(msg.audio);
      scheduleAudioChunk(samples);

    } else if (msg.type === "on-ai-audio-end") {
      // Nothing to do — scheduler drains naturally
    }
  });
}

// ── Mic capture ───────────────────────────────────────────────────────────
startBtn.addEventListener("click", async () => {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    addLine("-- mic access denied: " + e.message + " --");
    return;
  }

  // Single AudioContext used for both mic capture (at 16 kHz) and TTS playback.
  // Web Audio resamples automatically when playing buffers at a different rate.
  audioContext = new AudioContext({ sampleRate: MIC_SAMPLE_RATE });
  sourceNode   = audioContext.createMediaStreamSource(micStream);

  scriptNode = audioContext.createScriptProcessor(BUFFER_SIZE, 1, 1);
  scriptNode.onaudioprocess = (e) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const samples = new Float32Array(e.inputBuffer.getChannelData(0));
    ws.send(samples.buffer);
  };

  sourceNode.connect(scriptNode);
  scriptNode.connect(audioContext.destination);

  connectWS();
  startBtn.disabled = true;
  stopBtn.disabled  = false;
  addLine("-- mic started, speak now --");
});

stopBtn.addEventListener("click", () => {
  scriptNode?.disconnect();
  sourceNode?.disconnect();
  micStream?.getTracks().forEach(t => t.stop());
  audioContext?.close();
  audioContext = null;
  ws?.close();

  resetAudioScheduler();
  startBtn.disabled = false;
  stopBtn.disabled  = true;
  addLine("-- stopped --");
});

// ── Helpers ───────────────────────────────────────────────────────────────
function addLine(text) {
  const div = document.createElement("div");
  div.textContent = text;
  messages.appendChild(div);
  scrollDown();
  return div;
}

function scrollDown() {
  messages.scrollTop = messages.scrollHeight;
}
</script>
</body>
</html>
