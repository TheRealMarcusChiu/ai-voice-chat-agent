<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Voice Chat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141816;
    --surface2: #1c201e;
    --border: #2a2e2c;
    --accent: #00e5a0;
    --accent-dim: #00e5a020;
    --accent2: #00b87a;
    --text: #d4dbd7;
    --text-dim: #6b7870;
    --text-muted: #3d4541;
    --danger: #ff5f57;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 80%, #00e5a008 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 20%, #00b87a06 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 28px;
  }
  .header-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .header-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    display: inline-block;
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
    align-self: center;
  }
  .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.error { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

  /* Config panel */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input[type="text"]:focus { border-color: var(--accent2); }
  input[type="text"]::placeholder { color: var(--text-muted); }

  /* Server selector */
  .server-options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }
  .server-opt {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
  }
  .server-opt:hover { border-color: var(--text-muted); }
  .server-opt.active { border-color: var(--accent); background: var(--accent-dim); }
  .server-opt .opt-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: block;
    margin-bottom: 3px;
  }
  .server-opt.active .opt-label { color: var(--accent); }
  .server-opt .opt-addr {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .server-opt.active .opt-addr { color: var(--text-dim); }

  .custom-input-wrap {
    margin-top: 6px;
    display: none;
  }
  .custom-input-wrap.show { display: block; }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  button {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    padding: 10px 18px;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-start {
    background: var(--accent);
    color: #0d0f0e;
    flex: 1;
  }
  .btn-start:hover:not(:disabled) { background: #00f0aa; }

  .btn-stop {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    flex: 1;
  }
  .btn-stop:hover:not(:disabled) { border-color: var(--danger); color: var(--danger); }

  .btn-mute {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    flex: 1;
  }
  .btn-mute:hover:not(:disabled) { border-color: #f0c040; color: #f0c040; }
  .btn-mute.muted {
    background: #f0c04015;
    border-color: #f0c040;
    color: #f0c040;
  }

  /* Pulse ring when mic active */
  .btn-start.recording {
    animation: pulse-btn 1.8s ease-in-out infinite;
  }
  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 0 0 0 #00e5a040; }
    50% { box-shadow: 0 0 0 8px #00e5a000; }
  }

  /* Messages */
  .messages-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .messages-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .messages-header span {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .clear-btn {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 2px;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--text-dim); }

  #messages {
    height: 280px;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

  .msg.system { color: var(--text-muted); font-style: italic; }
  .msg.user { color: var(--text); }
  .msg.user::before { content: '▸ '; color: var(--accent); }
  .msg.server { color: #7dcfb6; }
  .msg.server::before { content: '◂ '; color: #7dcfb650; }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <span class="status-dot" id="status-dot"></span>
    <span class="header-title">Voice Chat</span>
    <span class="header-sub">/ realtime</span>
  </div>

  <div class="config-panel">
    <div class="field-group">

      <div class="field">
        <label>User ID</label>
        <input type="text" id="user-id" placeholder="enter your user id" autocomplete="off" spellcheck="false">
      </div>

      <div class="field">
        <label>Server</label>
        <div class="server-options">
          <div class="server-opt active" data-addr="ws://localhost:8765" onclick="selectServer(this)">
            <span class="opt-label">Local</span>
            <span class="opt-addr">localhost:8765</span>
          </div>
          <div class="server-opt" data-addr="ws://192.168.111.200:8765" onclick="selectServer(this)">
            <span class="opt-label">LAN</span>
            <span class="opt-addr">192.168.111.200</span>
          </div>
          <div class="server-opt" data-addr="custom" onclick="selectServer(this)">
            <span class="opt-label">Custom</span>
            <span class="opt-addr">ws://…</span>
          </div>
        </div>
        <div class="custom-input-wrap" id="custom-wrap">
          <input type="text" id="custom-addr" placeholder="ws://host:port" autocomplete="off" spellcheck="false">
        </div>
      </div>

    </div>
  </div>

  <div class="controls">
    <button class="btn-start" id="start-btn">⏺ Start Mic</button>
    <button class="btn-mute" id="mute-btn" disabled>⊘ Mute</button>
    <button class="btn-stop" id="stop-btn" disabled>■ Stop</button>
  </div>

  <div class="messages-wrap">
    <div class="messages-header">
      <span>Transcript</span>
      <button class="clear-btn" onclick="clearMessages()">Clear</button>
    </div>
    <div id="messages"></div>
  </div>

</div>

<script>
const startBtn   = document.getElementById("start-btn");
const stopBtn    = document.getElementById("stop-btn");
const muteBtn    = document.getElementById("mute-btn");
const messages   = document.getElementById("messages");
const statusDot  = document.getElementById("status-dot");
const userIdEl   = document.getElementById("user-id");
const customWrap = document.getElementById("custom-wrap");
const customAddr = document.getElementById("custom-addr");

const MIC_SAMPLE_RATE = 16000;
const TTS_SAMPLE_RATE = 24000;
const BUFFER_SIZE     = 256;

let ws           = null;
let audioContext = null;
let micStream    = null;
let scriptNode   = null;
let sourceNode   = null;
let selectedAddr = "ws://localhost:8765";
let onTranscriptFullId = null;
const streamLines = {};
let activeAudioSources = [];
let nextPlayAt = 0;
let isMuted = false;

// ── Server selector ───────────────────────────────────────────────────────
function selectServer(el) {
  document.querySelectorAll(".server-opt").forEach(o => o.classList.remove("active"));
  el.classList.add("active");
  selectedAddr = el.dataset.addr;
  customWrap.classList.toggle("show", selectedAddr === "custom");
}

function getWsUrl() {
  const userId = userIdEl.value.trim();
  let base = selectedAddr === "custom" ? customAddr.value.trim() : selectedAddr;
  if (!base) return null;
  if (!base.startsWith("ws://") && !base.startsWith("wss://")) base = "ws://" + base;
  // Append user_id as query param if provided
  if (userId) {
    const sep = base.includes("?") ? "&" : "?";
    return `${base}${sep}user_id=${encodeURIComponent(userId)}`;
  }
  return base;
}

// ── Audio ─────────────────────────────────────────────────────────────────
function scheduleAudioChunk(float32Samples, tts_sample_rate) {
  if (!audioContext) return;

  // Creates an in-memory audio buffer for this chunk
  const buffer = audioContext.createBuffer(
      1,                      // 1 channel (mono)
      float32Samples.length,  // number of samples
      tts_sample_rate         // e.g. 24000 Hz
  );
  buffer.copyToChannel(float32Samples, 0); // copy your float32 audio data in

  // Wraps the buffer in a playable "source node" and connects to speakers
  const source = audioContext.createBufferSource();
  source.buffer = buffer;
  source.connect(audioContext.destination); // destination = speakers

  // The scheduling logic
  const now = audioContext.currentTime;
  if (nextPlayAt < now) nextPlayAt = now; // if we've fallen behind, catch up to now
  source.start(nextPlayAt);               // schedule this chunk to start exactly when the last one ends
  nextPlayAt += buffer.duration;          // advance the cursor by this chunk's duration

  // `nextPlayAt` is the key — it's a running cursor that tracks when the next chunk should start:
  // - chunk 1: starts at t=0.0,  duration=0.5s → nextPlayAt = 0.5
  // - chunk 2: starts at t=0.5,  duration=0.5s → nextPlayAt = 1.0
  // - chunk 3: starts at t=1.0,  duration=0.5s → nextPlayAt = 1.5

  // Track the source
  activeAudioSources.push(source);

  // Auto-remove from list when it finishes naturally
  source.onended = () => {
    activeAudioSources = activeAudioSources.filter(s => s !== source);
  };
}

function resetAudioScheduler() { nextPlayAt = 0; }

function cancelActiveAudioSources() {
  activeAudioSources.forEach(source => {
    try {
      source.stop();  // immediately stops playback
    } catch (e) {
      // ignore — source may have already finished
    }
  });
  activeAudioSources = [];
  nextPlayAt = 0;  // reset scheduler
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWS(url) {
  ws = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  ws.addEventListener("open", () => {
    addLine("connected → " + url, "system");
    statusDot.className = "status-dot connected";
  });
  ws.addEventListener("close", () => {
    addLine("disconnected", "system");
    statusDot.className = "status-dot";
  });
  ws.addEventListener("error", () => {
    addLine("connection error", "system");
    statusDot.className = "status-dot error";
  });

  ws.addEventListener("message", ({ data }) => {
    const msg = JSON.parse(data);

    if (msg.type === "on-transcript-start") {
      console.log("transcript started: ", msg.utterance_id);
      cancelActiveAudioSources();
    } else if (msg.type === "on-transcript-unfinished" && msg.text) {
      if (msg.utterance_id !== onTranscriptFullId) {
        if (streamLines[msg.utterance_id]) {
          streamLines[msg.utterance_id].textContent = msg.text;
        } else {
          streamLines[msg.utterance_id] = addLine(msg.text, "user");
        }
        scrollDown();
      }
    } else if (msg.type === "on-transcript-end" && msg.text) {
      onTranscriptFullId = msg.utterance_id;
      if (streamLines[msg.utterance_id]) {
        streamLines[msg.utterance_id].textContent = msg.text;
        scrollDown();
        delete streamLines[msg.utterance_id];
      }
    } else if (msg.type === "on-ai-text-response-start") {
      streamLines[msg.id] = addLine("", "server");
      scrollDown();
    } else if (msg.type === "on-ai-text-response-chunk") {
      if (streamLines[msg.id]) {
        streamLines[msg.id].textContent += msg.chunk;
        scrollDown();
      }
    } else if (msg.type === "on-ai-text-response-end") {
      delete streamLines[msg.id];
    } else if (msg.type === "on-ai-audio-start") {
      resetAudioScheduler();
    } else if (msg.type === "on-ai-audio-chunk") {
      scheduleAudioChunk(new Float32Array(msg.audio), msg.samplerate);
    } else if (msg.type === "on-ai-audio-end") {
      // No-op for now
    }
  });
}

// ── Controls ──────────────────────────────────────────────────────────────
startBtn.addEventListener("click", async () => {
  const url = getWsUrl();
  if (!url) { addLine("enter a valid server address", "system"); return; }

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    addLine("mic access denied: " + e.message, "system");
    return;
  }

  audioContext = new AudioContext({ sampleRate: MIC_SAMPLE_RATE });
  sourceNode   = audioContext.createMediaStreamSource(micStream);
  scriptNode   = audioContext.createScriptProcessor(BUFFER_SIZE, 1, 1);

  scriptNode.onaudioprocess = (e) => {
    if (!ws || ws.readyState !== WebSocket.OPEN || isMuted) return;
    ws.send(new Float32Array(e.inputBuffer.getChannelData(0)).buffer);
  };

  sourceNode.connect(scriptNode);
  scriptNode.connect(audioContext.destination);

  connectWS(url);
  startBtn.disabled = true;
  stopBtn.disabled  = false;
  muteBtn.disabled  = false;
  startBtn.classList.add("recording");

  const uid = userIdEl.value.trim();
  addLine("mic started" + (uid ? " · user: " + uid : ""), "system");
});

stopBtn.addEventListener("click", () => {
  scriptNode?.disconnect();
  sourceNode?.disconnect();
  micStream?.getTracks().forEach(t => t.stop());
  audioContext?.close();
  audioContext = null;
  ws?.close();
  resetAudioScheduler();
  startBtn.disabled = false;
  stopBtn.disabled  = true;
  muteBtn.disabled  = true;
  muteBtn.classList.remove("muted");
  muteBtn.textContent = "⊘ Mute";
  isMuted = false;
  startBtn.classList.remove("recording");
  addLine("stopped", "system");
});

muteBtn.addEventListener("click", () => {
  isMuted = !isMuted;
  muteBtn.classList.toggle("muted", isMuted);
  muteBtn.textContent = isMuted ? "◉ Unmute" : "⊘ Mute";
  addLine(isMuted ? "mic muted" : "mic unmuted", "system");
});

// ── Helpers ───────────────────────────────────────────────────────────────
function addLine(text, type = "system") {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messages.appendChild(div);
  scrollDown();
  return div;
}
function scrollDown() { messages.scrollTop = messages.scrollHeight; }
function clearMessages() { messages.innerHTML = ""; }
</script>
</body>
</html>
